@let menu = languageService.texts.menu;

<div class="menu">
  <div class="title-bar">
    <h3 class="title">{{ menu.title }}</h3>
    <div class="controls">
      <app-window-controls
        [windowService]="windowService"
        [svgIconsService]="svgIconsService"
        [languageService]="languageService"
        [modalService]="modalService"
        [index]="0"
        [activeModal]="'menu'"
      ></app-window-controls>
    </div>
  </div>
  @if (windowService.ifContentOpen) {
  <div class="content" [ngClass]="{ 'modal-active': modalActive }">
    <app-site-navigation [modalActive]="true"></app-site-navigation>
    <app-color-toggle [modalActive]="true"></app-color-toggle>
    <app-language-toggle [modalActive]="true"></app-language-toggle>
  </div>
  }
</div>
