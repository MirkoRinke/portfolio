@if (modalService.isModalOpen) {
<section (click)="modalService.closeModalWrapper($event)">
  <div class="modal-wrapper">
    <div class="modal">
      <div class="title-bar">
        <h3 class="title">
          {{
            languageService.getLanguage() === "de"
              ? modalService.modal[modalService.index].titleDE
              : modalService.modal[modalService.index].titleEN
          }}
        </h3>
        <div class="controls">
          <app-window-controls
            [windowService]="windowService"
            [svgIconsService]="svgIconsService"
            [languageService]="languageService"
          ></app-window-controls>
        </div>
      </div>
      @if (windowService.isContentOpen) {
      <div class="content">
        @if (modalService.activeModal === "certificate") {
        <app-certificate-modal
          [modal]="modalService.modal"
          [index]="modalService.index"
        ></app-certificate-modal>
        } @else {
        <p>PLACEHOLDER</p>
        }
      </div>
      }
    </div>
  </div>
</section>
}
