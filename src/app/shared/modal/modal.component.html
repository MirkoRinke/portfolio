@if (modalService.isModalOpen) {
<section (click)="modalService.closeModalWrapper($event)">
  <div class="modal-wrapper">
    <div class="modal">
      <div class="title-bar">
        <h3 class="title">
          {{ modalService.modal[modalService.index].title }}
        </h3>
        <div class="controls">
          <button
            (click)="windowService.closeContent()"
            [innerHTML]="svgIconsService.returnIcon('minimize', 'icon')"
          ></button>
          <button
            (click)="windowService.openContent()"
            [innerHTML]="svgIconsService.returnIcon('maximize', 'icon')"
          ></button>
          <button
            (click)="modalService.closeModal()"
            [innerHTML]="svgIconsService.returnIcon('close', 'icon')"
          ></button>
        </div>
      </div>
      @if (windowService.isContentOpen) {
      <div class="content">
        @if (modalService.activeModal === "certificate") {
        <app-certificate-modal
          [modal]="modalService.modal"
          [index]="modalService.index"
        ></app-certificate-modal>
        } @else {
        <p>PLACEHOLDER</p>
        }
      </div>
      }
    </div>
  </div>
</section>
}
