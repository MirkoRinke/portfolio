@let ariaLabels = languageService.texts.navigation.ariaLabels; @let navigation =
languageService.texts.navigation.links;

<nav [ngClass]="modalActive ? 'modalActive' : 'site-navigation'">
  <ul>
    @for (item of utilityService.objectKeys(navigation); track $index) {
    <li>
      <a
        [routerLink]="['']"
        [fragment]="item"
        (click)="modalService.closeModal()"
        [ngClass]="{
          active: currentFragment() === item || currentFragment() === ''
        }"
        [attr.aria-label]="ariaLabels.links[item]"
        [attr.aria-current]="currentFragment() === item ? 'page' : null"
        >{{ navigation[item] }}</a
      >
    </li>
    }
  </ul>
</nav>
