@let portrait = languageService.texts.aboutMe.portrait; @let generalAriaLabels
=languageService.texts.general.ariaLabels.desktopIcon;
@if(windowService.ifWindowOpen) {
<div class="portrait" [ngClass]="{ 'modal-active': modalActive }">
  <div class="title-bar">
    <h3 class="title">
      <div
        [innerHTML]="svgIconsService.returnIcon('portrait', 'title-icon')"
      ></div>
      {{ portrait.title }}
    </h3>
    <div class="controls">
      <app-window-controls
        [windowService]="windowService"
        [svgIconsService]="svgIconsService"
        [languageService]="languageService"
        [modalService]="modalService"
        [index]="0"
        [activeModal]="'portrait'"
      ></app-window-controls>
    </div>
  </div>
  @if (windowService.ifContentOpen) {
  <app-portrait-content [modalActive]="modalActive"></app-portrait-content>
  }
</div>
} @else {
<button
  class="desktop-icons"
  (click)="windowService.openWindow()"
  [innerHTML]="svgIconsService.returnIcon('portrait', 'desktop-icon')"
  [attr.aria-label]="
    generalAriaLabels.firstText + portrait.title + generalAriaLabels.secondText
  "
  type="button"
></button>
}
