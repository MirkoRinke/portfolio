<section>
  <div class="content">
    <div class="icons-left">
      <span
        [innerHTML]="svgIconsService.returnIcon('SCSS', 'SCSS hero-icons')"
      ></span>
      <span
        [innerHTML]="svgIconsService.returnIcon('HTML', 'HTML hero-icons')"
      ></span>
    </div>
    <div class="central-section">
      <div class="icons-top">
        <span
          [innerHTML]="
            svgIconsService.returnIcon('typeScript', 'typeScript hero-icons')
          "
        ></span>
        <span
          [innerHTML]="
            svgIconsService.returnIcon('angular', 'angular hero-icons')
          "
        ></span>
      </div>
      <div class="textarea">
        <h1>{{ languageService.texts.hero.subHeading }}</h1>
        <h2>{{ languageService.texts.hero.mainHeading }}</h2>
        <button>
          <span [innerHTML]="svgIconsService.returnIcon('eMail')"></span>
          {{ languageService.texts.hero.contactMe }}
        </button>
      </div>
    </div>
    <div class="icons-right">
      <span
        [innerHTML]="svgIconsService.returnIcon('react', 'react hero-icons')"
      ></span>
      <span
        [innerHTML]="svgIconsService.returnIcon('vue', 'vue hero-icons')"
      ></span>
    </div>
  </div>
</section>
