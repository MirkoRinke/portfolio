<div class="game">
  <canvas id="game-canvas" width="600" height="600"></canvas>
  <button
    [ngClass]="{ isGameRunning: isGameRunning }"
    (click)="startGame()"
    class="start-button"
  >
    <div
      [innerHTML]="svgIconsService.returnIcon('snake.exe', 'snake')"
      [attr.aria-hidden]="true"
    ></div>
    {{
      hasWon === undefined
        ? "Start Game"
        : hasWon === true
        ? "You won, play again"
        : "Game Over, Play Again"
    }}
  </button>
  <div class="game-controls">
    <button class="up" (touchstart)="changeDirection('UP')">&#9650;</button>
    <button class="left" (touchstart)="changeDirection('LEFT')">&#9664;</button>
    <button class="right" (touchstart)="changeDirection('RIGHT')">
      &#9654;
    </button>
    <button class="down" (touchstart)="changeDirection('DOWN')">&#9660;</button>
  </div>
</div>
