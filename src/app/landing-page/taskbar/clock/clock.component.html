@let ariaLabels = languageService.texts.taskbar.ariaLabels;

<div
  class="time-info"
  [attr.aria-label]="
    ariaLabels.currentTime +
    (languageService.getLanguage() === 'de' ? fullDateDE : fullDateEN)
  "
>
  <p>{{ currentHours }}</p>
  <p>
    {{ languageService.getLanguage() === "de" ? fullDateDE : fullDateEN }}
  </p>
</div>
