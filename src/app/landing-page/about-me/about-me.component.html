@let ariaLabels = languageService.texts.aboutMe.ariaLabels.infoBox; @let
infoBoxPath = languageService.texts.aboutMe.infoBox;

<section>
  <app-portrait></app-portrait>
  <div class="info">
    @for (item of
    utilityService.objectKeys(languageService.texts.aboutMe.infoBox); track
    $index) { @let infoBox = infoBoxPath['infoBox' + $index];
    <app-info-box
      [title]="infoBox.title"
      [textarea]="infoBox.textarea"
      [index]="$index"
      [attr.aria-label]="[ariaLabels.description + ' ' + infoBox.title]"
    ></app-info-box>
    }
  </div>
</section>
