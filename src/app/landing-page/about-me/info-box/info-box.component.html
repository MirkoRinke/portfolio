@if (isWindowOpen) {
<div class="info-box">
  <div class="title-bar">
    <h3 class="title">{{ title }}</h3>
    <div class="controls">
      <span
        (click)="closeContent()"
        [innerHTML]="svgIconsService.returnIcon('minimize', 'icon')"
      ></span>
      <span
        (click)="openContent()"
        [innerHTML]="svgIconsService.returnIcon('maximize', 'icon')"
      ></span>
      <span
        (click)="closeWindow()"
        [innerHTML]="svgIconsService.returnIcon('close', 'icon')"
      ></span>
    </div>
  </div>
  @if (isContentOpen) {
  <div class="content">
    <p>
      {{ textarea }}
    </p>
  </div>
  }
</div>
} @else {
<div
  class="desktop-icons"
  (click)="openWindow()"
  [innerHTML]="svgIconsService.returnIcon('document', 'desktop-icon')"
></div>
}
