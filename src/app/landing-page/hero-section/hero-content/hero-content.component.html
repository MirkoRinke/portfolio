@let hero = languageService.texts.hero; @let ariaLabels =
languageService.texts.hero.ariaLabels;

<div class="textarea">
  <h2>{{ hero.mainHeading }}</h2>
  <h1>{{ hero.subHeading }}</h1>
  <button
    [routerLink]="['']"
    fragment="contact"
    [attr.aria-label]="ariaLabels.contactMe"
    type="button"
  >
    <div
      [innerHTML]="svgIconsService.returnIcon('eMail')"
      [attr.aria-hidden]="true"
    ></div>
    {{ hero.contactMe }}
  </button>
</div>
