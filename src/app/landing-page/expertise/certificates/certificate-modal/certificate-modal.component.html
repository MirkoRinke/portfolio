<div class="modal-content">
  <span
    class="left"
    (click)="
      modalService.prevModal(modalService.modal, index - 1, 'certificate')
    "
    [innerHTML]="svgIconsService.returnIcon('arrowBackward', 'icon')"
  ></span>
  <img [src]="modal[index].image" alt="Description" />
  <span
    class="right"
    (click)="
      modalService.nextModal(modalService.modal, index + 1, 'certificate')
    "
    [innerHTML]="svgIconsService.returnIcon('arrowForward', 'icon')"
  ></span>
</div>
