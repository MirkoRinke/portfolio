<section>
  @if (windowService.isWindowOpen) {
  <div class="expertise">
    <div class="title-bar">
      <div class="taps">
        <button
          class="tap"
          [class.active]="tapService.isTapActive('skills')"
          (click)="tapService.activateTap('skills')"
          [attr.aria-pressed]="tapService.isTapActive('skills')"
          [attr.aria-label]="
            languageService.texts.expertise.ariaLabels.taps.skillsTap
          "
        >
          {{ languageService.texts.expertise.certificates.taps.skillsTap }}
          <div [innerHTML]="svgIconsService.returnIcon('close', 'icon')"></div>
        </button>
        <button
          class="tap"
          [class.active]="tapService.isTapActive('certificates')"
          (click)="tapService.activateTap('certificates')"
          [attr.aria-pressed]="tapService.isTapActive('certificates')"
          [attr.aria-label]="
            languageService.texts.expertise.ariaLabels.taps.certificatesTap
          "
        >
          {{
            languageService.texts.expertise.certificates.taps.certificatesTap
          }}
          <div [innerHTML]="svgIconsService.returnIcon('close', 'icon')"></div>
        </button>
      </div>
      <div class="controls">
        <button
          (click)="windowService.closeContent()"
          [innerHTML]="svgIconsService.returnIcon('minimize', 'icon')"
          [attr.aria-label]="languageService.texts.ariaLabels.controls.minimize"
        ></button>
        <button
          (click)="windowService.openContent()"
          [innerHTML]="svgIconsService.returnIcon('maximize', 'icon')"
          [attr.aria-label]="languageService.texts.ariaLabels.controls.maximize"
        ></button>
        <button
          (click)="windowService.closeWindow()"
          [innerHTML]="svgIconsService.returnIcon('close', 'icon')"
          [attr.aria-label]="languageService.texts.ariaLabels.controls.close"
        ></button>
      </div>
    </div>
    @if (windowService.isContentOpen) {
    <div class="content">
      @if (tapService.isTapActive('skills')) {
      <app-skills></app-skills>
      } @if (tapService.isTapActive('certificates')) {
      <app-certificates></app-certificates>
      }
    </div>
    }
  </div>
  } @else {
  <button
    class="desktop-icons"
    (click)="windowService.openWindow()"
    [innerHTML]="svgIconsService.returnIcon('folder', 'desktop-icon')"
    [attr.aria-label]="languageService.texts.expertise.ariaLabels.desktopIcon"
  ></button>
  }
</section>
