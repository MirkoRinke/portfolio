<section>
  @if (windowService.isWindowOpen) {
  <div class="expertise">
    <div class="title-bar">
      <div class="taps">
        <span class="tap">skills_profile</span>
        <span class="tap">certificates</span>
      </div>

      <div class="controls">
        <span
          (click)="windowService.closeContent()"
          [innerHTML]="svgIconsService.returnIcon('minimize', 'icon')"
        ></span>
        <span
          (click)="windowService.openContent()"
          [innerHTML]="svgIconsService.returnIcon('maximize', 'icon')"
        ></span>
        <span
          (click)="windowService.closeWindow()"
          [innerHTML]="svgIconsService.returnIcon('close', 'icon')"
        ></span>
      </div>
    </div>
    @if (windowService.isContentOpen) {
    <div class="content">
      <div class="skills">
        @for (skill of skills; track $index) { @if (skill.visibility) {
        <div class="skill-icon">
          <div
            [innerHTML]="
              svgIconsService.returnIcon(skill.icon, skill.icon + ' icon')
            "
          ></div>
          <h4 class="{{ skill.icon + '-name' }} skill-name">
            {{ skill.name }}
          </h4>
        </div>
        }}
      </div>
      <div class="learningSkills">
        @for (skill of learningSkills; track $index) { @if (skill.visibility) {
        <div class="skill-icon">
          <div
            [innerHTML]="
              svgIconsService.returnIcon(skill.icon, 'learning icon')
            "
          ></div>
          <h4 class="learning skill-name">
            {{ skill.name }}
          </h4>
        </div>
        }}
      </div>
    </div>
    }
  </div>
  } @else {
  <div
    class="desktop-icons"
    (click)="windowService.openWindow()"
    [innerHTML]="svgIconsService.returnIcon('document', 'desktop-icon')"
  ></div>
  }
</section>
